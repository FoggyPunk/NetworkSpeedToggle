name: Update Visitor Counter

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Increment counter
        run: |
          VALUE=$(jq ".value + 1" visitors.json)
          echo "{ \"value\": $VALUE }" > visitors.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add visitors.json
          git commit -m "Increment visitor count" || echo "No changes"
          git push
